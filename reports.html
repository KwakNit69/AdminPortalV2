<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vendor Performance & Compliance</title>

  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/sidebar.css" />
  <link rel="stylesheet" href="css/reports.css" />
</head>
<body>
  
  <div class="dashboard-layout">
    <div id="sidebar-container"></div>

    <main class="main-content">
      
      <header class="page-header">
        <div>
          <small>REPORTS / COMPLIANCE</small>
          <h1>Vendor Performance & Compliance</h1>
        </div>
        <button id="exportBtn" class="export-btn">Export CSV Report</button>
      </header>

      <section class="report-grid">
        
        <div class="report-card top-card">
          <h3>Top Performing</h3>
          <div id="topVendorList"></div>
        </div>

        <div class="report-card warning-card">
          <h3>Warning (1-2 Flagged)</h3>
          <div id="warningVendorList"></div>
        </div>

        <div class="report-card critical-card">
          <h3>Critical (3+ Flagged)</h3>
          <div id="criticalVendorList"></div>
        </div>

      </section>

      <section class="summary-card">
        <h3>Comprehensive Vendor Summary</h3>
        <table>
          <thead>
            <tr>
              <th>Vendor Name</th>
              <th>Total Inspections</th>
              <th>Clean Sessions</th>
              <th>Flagged Sessions</th>
              <th>Compliance Status</th>
            </tr>
          </thead>
          <tbody id="vendorTableBody"></tbody>
        </table>
      </section>
      
    </main>
  </div>

  <script type="module" src="js/sidebar.js"></script>
  <script type="module" src="js/reports.js"></script>
</body>
</html>
