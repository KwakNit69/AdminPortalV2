<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QualiMeat Secure Access</title>

  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">

</head>
<body>

  <div id="navbar-container"></div>

  <main class="auth-wrapper">
    <div class="auth-header">
      <div class="icon-circle">🛡️</div>
      <h1>QualiMeat Secure Access</h1>
      <p>INSPECTION & QUALITY CONTROL PORTAL</p>
    </div>

    <div class="auth-card">
      <form onsubmit="login(event)">
        
        <label>CORPORATE EMAIL</label>
        <input id="email" type="text" placeholder="admin" required>

        <div class="password-row">
          <label>SECURITY KEY</label>
          <a href="#">Forgot Password?</a>
        </div>

        <input id="password" type="password" placeholder="admin" required>

        <button type="submit" class="primary-btn">
          Sign In →
        </button>

        <button type="button" class="google-btn" onclick="googleLogin()">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
          <span>Sign in with Google</span>
        </button>

      </form>

      <div class="signup-text">
        New to the inspection fleet?
        <a href="register.html">Create an Account</a>
      </div>
    </div>

    <small class="compliance">
      Authorized use only. This portal is monitored by Emerald Precision
      Security Operations.
    </small>
  </main>

<script type="module" src="js/sidebar.js"></script>
  <script type="module" src="js/auth.js"></script>

</body>
</html>
